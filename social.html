<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>iPrime — подписывайтесь на нас</title>
    <style>
        /* Обнуление и базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            padding: 48px 32px 40px;
            text-align: center;
        }

        /* Логотип — крупно и со вкусом */
        .logo {
            margin-bottom: 40px;
        }
        .logo img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Заголовок */
        .description {
            font-size: 17px;
            line-height: 1.6;
            color: #3a3a3e;
            margin-bottom: 36px;
            font-weight: 400;
        }
        .description strong {
            color: #1d1d1f;
            font-weight: 600;
        }

        /* Список соцсетей */
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 40px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            background-color: #f8f8fa;
            border-radius: 16px;
            text-decoration: none;
            color: #1d1d1f;
            font-size: 17px;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.15s;
            border: 1px solid transparent;
        }
        .social-link:hover {
            background-color: #eef0f3;
            transform: scale(1.01);
        }
        .social-link:active {
            transform: scale(0.97);
        }

        /* Иконки соцсетей (эмодзи + кастомные цвета при наведении) */
        .social-link .icon {
            font-size: 28px;
            line-height: 1;
            flex-shrink: 0;
        }
        .social-link .label {
            flex: 1;
            text-align: left;
        }

        /* Специфические цвета для каждой соцсети при наведении */
        .social-link.vk:hover {
            background-color: #e8edf8;
            border-color: #4a76a8;
        }
        .social-link.telegram:hover {
            background-color: #e6f3fa;
            border-color: #26a5e4;
        }
        .social-link.max:hover {
            background-color: #f0ebf5;
            border-color: #9b59b6;
        }
        .social-link.site:hover {
            background-color: #e8f5ed;
            border-color: #2ecc71;
        }

        /* Футер с QR-кодом */
        .qr-section {
            border-top: 1px solid #e9e9ef;
            padding-top: 28px;
            margin-top: 8px;
        }
        .qr-section p {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 12px;
        }
        .qr-section img {
            max-width: 140px;
            height: auto;
            border-radius: 16px;
            background-color: #ffffff;
            padding: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        /* Адаптив */
        @media (max-width: 450px) {
            .container {
                padding: 32px 20px 28px;
            }
            .logo img {
                max-width: 160px;
            }
            .social-link {
                padding: 14px 16px;
                font-size: 16px;
            }
            .social-link .icon {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Логотип — используем ту же ссылку, что и на инструкциях -->
    <div class="logo">
        <img 
            src="https://github.com/musaelyanigoru-gif/data_transfer/blob/main/iprime.png?raw=true" 
            alt="iPrime">
    </div>

    <!-- Текст-приглашение -->
    <p class="description">
        <strong>Подписывайтесь на наши социальные сети</strong><br>
        Получайте актуальную информацию об акциях и скидках:
    </p>

    <!-- Ссылки на соцсети -->
    <div class="social-list">
        <a href="https://vk.ru/iprimetmb" target="_blank" class="social-link vk">
            <span class="icon">📱</span>
            <span class="label">Мы ВКонтакте</span>
            <span style="color: #8e8e93; font-weight: 400;">→</span>
        </a>

        <a href="https://t.me/iprimeru" target="_blank" class="social-link telegram">
            <span class="icon">💬</span>
            <span class="label">Мы в Telegram</span>
            <span style="color: #8e8e93; font-weight: 400;">→</span>
        </a>

        <a href="https://max.ru/id682905742546_biz" target="_blank" class="social-link max">
            <span class="icon">⭐</span>
            <span class="label">Мы в Max</span>
            <span style="color: #8e8e93; font-weight: 400;">→</span>
        </a>

        <a href="https://iprime.ru/" target="_blank" class="social-link site">
            <span class="icon">🌐</span>
            <span class="label">Наш сайт</span>
            <span style="color: #8e8e93; font-weight: 400;">→</span>
        </a>
    </div>

    <!-- Блок с QR-кодом -->
    <div class="qr-section">
        <p>📸 Отсканируйте QR-код, чтобы открыть эту страницу</p>
        <!-- Вставьте сюда сгенерированный QR-код -->
        <img src="qrcode.png" alt="QR-код на страницу с соцсетями iPrime">
    </div>
</div>

</body>
</html>
